name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Caches the downloaded Android SDK/NDK so future builds don't
      # re-download several hundred MB every run. Only busts when
      # buildozer.spec changes.
      - name: Cache Buildozer global directory
        uses: actions/cache@v5
        with:
          path: .buildozer_cache
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      # Runs Buildozer's own official Docker image directly instead of
      # the ArtemSBulgakov/buildozer-action wrapper. That wrapper builds
      # its own Docker image from scratch on every run, and its Dockerfile
      # currently fails on `apt update` after adding a broken PPA. Pulling
      # the prebuilt official image skips that step entirely.
      - name: Build with Buildozer
        run: |
          mkdir -p "$PWD/.buildozer_cache"
          docker run --rm \
            --volume "$PWD/.buildozer_cache":/home/user/.buildozer \
            --volume "$PWD":/home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: coinflipultimate-apk
          path: bin/*.apk
